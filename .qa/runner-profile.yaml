# Runner profile — AutoGuide monorepo

issueBackend: github

github:
  defaultLabels: []
  milestone: null

stackProfile: monorepo

locale: de

runtimeAxes:
  - local
  - cloud
  - tauri

checksSnippet: "pnpm run verify"

helperSkills:
  documentation-lookup:
    - playwright
    - ollama
  security-review:
    - ai-privacy
    - api-keys

epicPrdSearch:
  - docs/PRD.md
  - docs/SPEC_FULL.md

# In-repo integration scenarios (CI) — no external repos required
integrationScenarios:
  primary: integrations/hr-workflows

# Optional: clone these locally for manual realism checks only (not a build dependency)
optionalExternalApps:
  - name: browo-hr
    typicalPath: ../browo-hr/browo-hr/frontend
  - name: sagadrive
    typicalPath: ../sagadrive
  - name: scriptony-multihost
    typicalPath: ../scriptony-multihost
